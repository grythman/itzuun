{% load static %}
<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITZuun Admin Dashboard</title>
  <link rel="stylesheet" href="{% static 'web/style.css' %}">
</head>
<body>
  <div id="sessionBanner" class="session-banner hidden" role="status" aria-live="polite"></div>
  <header class="topbar">
    <h1>ITZuun Admin Dashboard</h1>
    <div>
      <a href="/" class="link-btn">Main UI</a>
    </div>
  </header>

  <main class="grid">
    <section class="card span2">
      <h2>Admin Login (OTP)</h2>
      <div class="row">
        <input id="emailInput" type="email" placeholder="admin email">
        <button id="requestOtpBtn">OTP авах</button>
      </div>
      <div class="row">
        <input id="otpTokenInput" type="text" placeholder="otp_token">
        <input id="otpCodeInput" type="text" placeholder="6 оронтой OTP">
        <button id="verifyOtpBtn">Нэвтрэх</button>
        <button id="logoutBtn" class="ghost">Гарах</button>
      </div>
      <div id="meBox" class="badge">Нэвтрээгүй</div>
    </section>

    <section class="card span2">
      <h2>Escrow Approval</h2>
      <div class="row">
        <button id="loadAdminEscrowBtn">Pending escrow авах</button>
        <input id="approveEscrowId" type="number" placeholder="Escrow ID">
        <button id="approveEscrowBtn">Escrow approve</button>
      </div>
      <div id="adminEscrowList" class="list"></div>
    </section>

    <section class="card span2">
      <h2>Dispute Resolve</h2>
      <div class="row">
        <button id="loadAdminDisputesBtn">Unresolved dispute авах</button>
      </div>
      <div class="row">
        <input id="resolveDisputeId" type="number" placeholder="Dispute ID">
        <select id="resolveAction">
          <option value="release">release</option>
          <option value="refund">refund</option>
          <option value="split">split</option>
        </select>
        <input id="resolveReleaseAmount" type="number" placeholder="Release amount">
        <input id="resolveRefundAmount" type="number" placeholder="Refund amount">
        <input id="resolveNote" type="text" placeholder="Note">
        <button id="resolveDisputeBtn" class="warn">Dispute resolve</button>
      </div>
      <div id="adminDisputeList" class="list"></div>
    </section>

    <section class="card span2">
      <h2>Log</h2>
      <pre id="logBox"></pre>
    </section>
  </main>

  <script src="{% static 'web/admin.js' %}"></script>
</body>
</html>
